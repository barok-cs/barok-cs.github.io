<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jp: {
                            red: '#D62828',
                            gold: '#F77F00',
                            blue: '#003049',
                            light: '#FCBF49',
                            cream: '#EAE2B7',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        jp: ['"Noto Sans JP"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #003049, #D62828);
            min-height: 100vh;
        }
        .soal-card {
            transition: all 0.3s ease;
        }
        .pilihan {
            transition: all 0.2s ease;
        }
        .benar {
            background-color: #10B981 !important;
            color: white !important;
        }
        .salah {
            background-color: #EF4444 !important;
            color: white !important;
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-white mb-2 drop-shadow-lg">
                🇯🇵 Kuis Kosakata Jepang <br> <span class="text-jp-light">BAB 11</span>
            </h1>
            <p class="text-white/80">Uji ingatanmu! Pertanyaan muncul secara acak.</p>
            <div class="mt-4 text-white font-semibold">Skor: <span id="skor">0</span> / <span id="total-soal">0</span></div>
        </div>

        <!-- Area Soal -->
        <div id="area-soal" class="space-y-6">
            <!-- Soal akan muncul di sini lewat JavaScript -->
        </div>

        <!-- Tombol Navigasi -->
        <div class="flex justify-between mt-8">
            <button id="btn-ulang" class="bg-white/20 backdrop-blur-sm text-white px-6 py-3 rounded-lg font-semibold hover:bg-white/30 transition-all">
                🔄 Ulangi Kuis
            </button>
            <button id="btn-berikut" class="bg-jp-gold text-white px-6 py-3 rounded-lg font-semibold shadow-lg hover:scale-105 transition-all">
                Soal Berikutnya ➡️
            </button>
        </div>

        <!-- Hasil Akhir -->
        <div id="hasil-akhir" class="hidden mt-10 bg-white/90 backdrop-blur-md rounded-2xl p-8 text-center shadow-2xl">
            <h2 class="text-3xl font-bold text-jp-blue mb-4">🎉 Selesai!</h2>
            <p class="text-xl mb-2">Skor Kamu:</p>
            <p class="text-5xl font-bold text-jp-red mb-4" id="nilai-akhir">0</p>
            <p id="pesan-hasil" class="text-lg text-gray-700"></p>
            <button onclick="mulaiKuis()" class="mt-6 bg-jp-gold text-white px-8 py-3 rounded-lg font-semibold hover:scale-105 transition-all">
                Main Lagi
            </button>
        </div>
    </div>


    <script>
        // ==============================================

        // ==============================================
        const kosakata = [

            { id:20, jp:"～かい", kanji:"～回", arti:"~ kali" },
            { id:21, jp:"りんご", kanji:"", arti:"Apel" },
            { id:22, jp:"みかん", kanji:"", arti:"Jeruk" },
            { id:23, jp:"サンドイッチ", kanji:"", arti:"Sandwich" },
            { id:24, jp:"カレー", kanji:"", arti:"Kare" },
            { id:25, jp:"アイスクリーム", kanji:"", arti:"Es krim" },
            { id:26, jp:"きって", kanji:"切手", arti:"Perangko" },
            { id:27, jp:"はがき", kanji:"", arti:"Kartu pos" },
            { id:28, jp:"ふうとう", kanji:"封筒", arti:"Amplop" },
            { id:29, jp:"がいこく", kanji:"外国", arti:"Luar negeri" },
            { id:30, jp:"りゅうがくせい", kanji:"留学生", arti:"Pelajar asing" },
            { id:31, jp:"クラス", kanji:"", arti:"Kelas" },
            { id:32, jp:"～じかん", kanji:"～時間", arti:"~ jam" },
            { id:33, jp:"～しゅうかん", kanji:"～週間", arti:"~ minggu" },
            { id:34, jp:"～かげつ", kanji:"～か月", arti:"~ bulan" },
            { id:35, jp:"～ねん", kanji:"～年", arti:"~ tahun" },
            { id:36, jp:"～ぐらい", kanji:"", arti:"Kira-kira ~" },
            { id:37, jp:"どのくらい", kanji:"", arti:"Berapa lama?" },
            { id:38, jp:"ぜんぶで", kanji:"全部で", arti:"Semuanya" },
            { id:39, jp:"みんな", kanji:"", arti:"Semua" },
            { id:40, jp:"～だけ", kanji:"", arti:"Hanya ~" },
            { id:41, jp:"かしこまりました", kanji:"", arti:"Baik / mengerti" },
            { id:42, jp:"いいてんきですね", kanji:"いい天気ですね", arti:"Cuacanya bagus ya..." },
            { id:43, jp:"おでかけですか", kanji:"お出かけですか", arti:"Mau keluar?" },
            { id:44, jp:"いってらっしゃい", kanji:"行ってらっしゃい", arti:"Hati-hati (berangkatnya)" },
            { id:45, jp:"いってきます", kanji:"行ってきます", arti:"Saya berangkat" },
            { id:46, jp:"ふなびん", kanji:"船便", arti:"Pos laut" },
            { id:47, jp:"こうくうびん", kanji:"航空便", arti:"Pos udara" },
            { id:48, jp:"エアメール", kanji:"", arti:"Pos udara" },
            { id:49, jp:"オーストラリア", kanji:"", arti:"Australia" },
            { id:50, jp:"ていしょく", kanji:"定食", arti:"Makanan paket" },

            { id:52, jp:"てんどん", kanji:"天どん", arti:"Semangkuk Nasi dan tempura" },
            { id:53, jp:"おやこどん", kanji:"", arti:"Semangkuk Nasi, daging ayam dan telur" },
            { id:54, jp:"ぎゅうどん", kanji:"牛どん", arti:"Semangkuk nasi dan daging sapi" },
            { id:55, jp:"やきにく", kanji:"焼肉", arti:"Daging panggang" },
            { id:56, jp:"やさいため", kanji:"野菜ため", arti:"Sayur goreng" },
            { id:57, jp:"つけもの", kanji:"漬物", arti:"Asinan" },
            { id:58, jp:"みそしる", kanji:"みそ汁", arti:"Sup miso" },
            { id:59, jp:"おにぎり", kanji:"", arti:"Nasi kepal" },
            { id:60, jp:"てんぷら", kanji:"", arti:"Tempura" },
            { id:61, jp:"すし", kanji:"", arti:"Nasi dicampur cuka dan diberi ikan mentah" },
            { id:62, jp:"うどん", kanji:"", arti:"Mie jepang ukuran besar" },
            { id:63, jp:"そば", kanji:"", arti:"Mie jepang warna abu-abu" },
            { id:64, jp:"ラーメン", kanji:"", arti:"Mie jepang ukuran biasa" },
            { id:65, jp:"やきそば", kanji:"焼きそば", arti:"Mie goreng jepang" },
            { id:66, jp:"おこのみやき", kanji:"お好み焼き", arti:"Gorengan dicampur daging di loyang" },
            { id:67, jp:"カレーライス", kanji:"", arti:"Nasi kare" },
            { id:68, jp:"ハンバーグ", kanji:"", arti:"Hamburger" },
            { id:69, jp:"コロッケ", kanji:"", arti:"Kroket" },
            { id:70, jp:"えびフライ", kanji:"", arti:"Udang goreng tepung" },
            { id:71, jp:"フライドチキン", kanji:"", arti:"Ayam goreng" },
            { id:72, jp:"サラダ", kanji:"", arti:"Salad" },
            { id:73, jp:"スープ", kanji:"", arti:"Sup" },
            { id:74, jp:"スパゲッティ", kanji:"", arti:"Spageti" },
            { id:75, jp:"ピザ", kanji:"", arti:"Pizza" },
            { id:76, jp:"トースト", kanji:"", arti:"Roti panggang" },
            { id:77, jp:"コーヒー", kanji:"", arti:"Kopi" },
            { id:78, jp:"こうちゃ", kanji:"紅茶", arti:"Teh" },
            { id:79, jp:"ココア", kanji:"", arti:"Minuman coklat" },
            { id:80, jp:"ジュース", kanji:"", arti:"Jus" },
            { id:81, jp:"コーラ", kanji:"", arti:"Coca cola" }
        ];

        // ==============================================
        // VARIABEL KUIS
        // ==============================================
        let daftarSoal = [];
        let nomorSekarang = 0;
        let skorBenar = 0;
        let sudahDijawab = false;

        // Elemen HTML
        const areaSoal = document.getElementById('area-soal');
        const skorEl = document.getElementById('skor');
        const totalSoalEl = document.getElementById('total-soal');
        const btnBerikut = document.getElementById('btn-berikut');
        const btnUlang = document.getElementById('btn-ulang');
        const hasilAkhirEl = document.getElementById('hasil-akhir');
        const nilaiAkhirEl = document.getElementById('nilai-akhir');
        const pesanHasilEl = document.getElementById('pesan-hasil');

        // ==============================================
        // FUNGSI UTAMA
        // ==============================================
        function mulaiKuis() {
            // Reset semua
            nomorSekarang = 0;
            skorBenar = 0;
            sudahDijawab = false;
            hasilAkhirEl.classList.add('hidden');
            areaSoal.innerHTML = '';
            
            // Acak urutan soal
            daftarSoal = [...kosakata].sort(() => Math.random() - 0.5);
            
            // Tampilkan total
            totalSoalEl.innerText = daftarSoal.length;
            skorEl.innerText = skorBenar;

            // Tampilkan soal pertama
            tampilkanSoal();
        }

        function tampilkanSoal() {
            sudahDijawab = false;
            const soal = daftarSoal[nomorSekarang];

            // Buat pilihan jawaban (A-E)
            let pilihanJawaban = [soal.arti]; // Jawaban benar
            // Ambil 4 jawaban acak lain
            while(pilihanJawaban.length < 5) {
                const acak = kosakata[Math.floor(Math.random() * kosakata.length)].arti;
                if(!pilihanJawaban.includes(acak)) pilihanJawaban.push(acak);
            }
            // Acak posisi pilihan
            pilihanJawaban = pilihanJawaban.sort(() => Math.random() - 0.5);

            // HTML Soal
            areaSoal.innerHTML = `
            <div class="soal-card bg-white/90 backdrop-blur-md rounded-2xl p-8 shadow-2xl">
                <div class="mb-6 text-center">
                    <span class="text-sm text-gray-500">Soal ${nomorSekarang+1} dari ${daftarSoal.length}</span>
                    <h2 class="text-[clamp(1.5rem,4vw,2.5rem)] font-jp font-bold text-jp-blue mt-2">
                        ${soal.jp}
                    </h2>
                    ${soal.kanji ? `<p class="text-xl text-jp-red font-semibold mt-1">${soal.kanji}</p>` : ''}
                </div>

                <div class="space-y-3 mt-8" id="daftar-pilihan">
                    ${pilihanJawaban.map((pil, idx) => `
                    <button class="pilihan w-full text-left p-4 rounded-lg border-2 border-gray-200 hover:border-jp-gold hover:bg-jp-cream/30 transition-all" 
                            data-jawaban="${pil}">
                        <span class="font-bold mr-3">${String.fromCharCode(65+idx)}.</span> ${pil}
                    </button>
                    `).join('')}
                </div>
            </div>
            `;

            // Tambah event klik pilihan
            document.querySelectorAll('.pilihan').forEach(btn => {
                btn.addEventListener('click', cekJawaban);
            });
        }

        function cekJawaban(e) {
            if(sudahDijawab) return;
            sudahDijawab = true;

            const dipilih = e.target.closest('.pilihan');
            const jawabanUser = dipilih.dataset.jawaban;
            const jawabanBenar = daftarSoal[nomorSekarang].arti;

            // Tandai benar/salah
            document.querySelectorAll('.pilihan').forEach(btn => {
                btn.classList.add('opacity-70');
                if(btn.dataset.jawaban === jawabanBenar) btn.classList.add('benar');
            });

            if(jawabanUser === jawabanBenar) {
                skorBenar++;
                skorEl.innerText = skorBenar;
                dipilih.classList.add('scale-[0.98]');
            } else {
                dipilih.classList.add('salah', 'scale-[0.98]');
            }
        }

        function soalBerikutnya() {
            nomorSekarang++;
            if(nomorSekarang < daftarSoal.length) {
                tampilkanSoal();
            } else {
                tampilkanHasil();
            }
        }

        function tampilkanHasil() {
            areaSoal.innerHTML = '';
            hasilAkhirEl.classList.remove('hidden');
            
            const nilai = Math.round((skorBenar / daftarSoal.length) * 100);
            nilaiAkhirEl.innerText = nilai + '%';

            // Pesan sesuai nilai
            if(nilai >= 90) pesanHasilEl.innerText = "Luar biasa! Hafalanmu sangat sempurna 👏";
            else if(nilai >= 75) pesanHasilEl.innerText = "Bagus sekali! Sudah sangat paham 🎉";
            else if(nilai >= 60) pesanHasilEl.innerText = "Cukup baik, tinggal sedikit lagi untuk sempurna 💪";
            else pesanHasilEl.innerText = "Masih perlu latihan lagi, semangat ya! 😊";
        }

        // Event tombol
        btnBerikut.addEventListener('click', soalBerikutnya);
        btnUlang.addEventListener('click', mulaiKuis);

        // Mulai kuis saat buka halaman
        window.onload = mulaiKuis;
    </script>
</body>
</html>
