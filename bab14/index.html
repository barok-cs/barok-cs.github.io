<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Kosakata Jepang - Bab 14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jp: {
                            red: '#D62828',
                            gold: '#F77F00',
                            blue: '#003049',
                            light: '#FCBF49',
                            cream: '#EAE2B7',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        jp: ['"Noto Sans JP"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #003049, #D62828);
            min-height: 100vh;
        }
        .soal-card {
            transition: all 0.3s ease;
        }
        .pilihan {
            transition: all 0.2s ease;
        }
        .benar {
            background-color: #10B981 !important;
            color: white !important;
        }
        .salah {
            background-color: #EF4444 !important;
            color: white !important;
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-white mb-2 drop-shadow-lg">
                🇯🇵 Kuis Kosakata Jepang <br> <span class="text-jp-light">BAB 14</span>
            </h1>
            <p class="text-white/80">Uji ingatanmu! Pertanyaan muncul secara acak.</p>
            <div class="mt-4 text-white font-semibold">Skor: <span id="skor">0</span> / <span id="total-soal">0</span></div>
        </div>

        <!-- Area Soal -->
        <div id="area-soal" class="space-y-6">
            <!-- Soal akan muncul di sini lewat JavaScript -->
        </div>

        <!-- Tombol Navigasi -->
        <div class="flex justify-between mt-8">
            <button id="btn-ulang" class="bg-white/20 backdrop-blur-sm text-white px-6 py-3 rounded-lg font-semibold hover:bg-white/30 transition-all">
                🔄 Ulangi Kuis
            </button>
            <button id="btn-berikut" class="bg-jp-gold text-white px-6 py-3 rounded-lg font-semibold shadow-lg hover:scale-105 transition-all">
                Soal Berikutnya ➡️
            </button>
        </div>

        <!-- Hasil Akhir -->
        <div id="hasil-akhir" class="hidden mt-10 bg-white/90 backdrop-blur-md rounded-2xl p-8 text-center shadow-2xl">
            <h2 class="text-3xl font-bold text-jp-blue mb-4">🎉 Selesai!</h2>
            <p class="text-xl mb-2">Skor Kamu:</p>
            <p class="text-5xl font-bold text-jp-red mb-4" id="nilai-akhir">0</p>
            <p id="pesan-hasil" class="text-lg text-gray-700"></p>
            <button onclick="mulaiKuis()" class="mt-6 bg-jp-gold text-white px-8 py-3 rounded-lg font-semibold hover:scale-105 transition-all">
                Main Lagi
            </button>
        </div>
    </div>


    <script>
        // ==============================================
        // DAFTAR KOSAKATA BAB 14 (SUDAH DIKOREKSI)
        // ==============================================
        const kosakata = [
            { id:1, jp:"つけます", kanji:"", arti:"Menyalakan, memasang, menghidupkan" },
            { id:2, jp:"けします", kanji:"消します", arti:"Mematikan, memadamkan" },
            { id:3, jp:"あけます", kanji:"開けます", arti:"Membuka" },
            { id:4, jp:"しめます", kanji:"閉めます", arti:"Menutup" },
            { id:5, jp:"いそぎます", kanji:"", arti:"Buru-buru" },
            { id:6, jp:"まちます", kanji:"待ちます", arti:"Menunggu" },
            { id:7, jp:"もちます", kanji:"持ちます", arti:"Membawa" },
            { id:8, jp:"とります", kanji:"取ります", arti:"Mengambil" },
            { id:9, jp:"てつだいます", kanji:"手伝います", arti:"Membantu" },
            { id:10, jp:"よびます", kanji:"呼びます", arti:"Memanggil" },
            { id:11, jp:"はなします", kanji:"話します", arti:"Berbicara" },
            { id:12, jp:"つかいます", kanji:"使います", arti:"Memakai" },
            { id:13, jp:"とめます", kanji:"止めます", arti:"Menghentikan" },
            { id:14, jp:"みせます", kanji:"見せます", arti:"Memperlihatkan" },
            { id:15, jp:"おしえます", kanji:"教えます", arti:"Memberitahu" },
            { id:16, jp:"すわります", kanji:"座ります", arti:"Duduk" },
            { id:17, jp:"たちます", kanji:"立ちます", arti:"Berdiri" },
            { id:18, jp:"はいります", kanji:"入ります", arti:"Masuk" },
            { id:19, jp:"でます", kanji:"出ます", arti:"Keluar" },
            { id:20, jp:"ふります", kanji:"降ります", arti:"Turun hujan" },
            { id:21, jp:"コピーします", kanji:"", arti:"Memfotocopy" },
            { id:22, jp:"でんき", kanji:"電気", arti:"Listrik, lampu" },
            { id:23, jp:"エアコン", kanji:"", arti:"AC" },
            { id:24, jp:"パスポート", kanji:"", arti:"Paspor" },
            { id:25, jp:"なまえ", kanji:"名前", arti:"Nama" },
            { id:26, jp:"じゅうしょ", kanji:"住所", arti:"Alamat" },
            { id:27, jp:"ちず", kanji:"地図", arti:"Peta" },
            { id:28, jp:"しお", kanji:"塩", arti:"Garam" },
            { id:29, jp:"さとう", kanji:"砂糖", arti:"Gula" },
            { id:30, jp:"もんだい", kanji:"問題", arti:"Masalah, soal" },
            { id:31, jp:"こたえ", kanji:"答え", arti:"Jawaban" },
            { id:32, jp:"よみかた", kanji:"読み方", arti:"Cara membaca" },
            { id:33, jp:"～かた", kanji:"～方", arti:"Cara~" },
            { id:34, jp:"まっすぐ", kanji:"", arti:"Lurus" },
            { id:35, jp:"ゆっくり", kanji:"", arti:"Pelan-pelan, istirahat dengan baik" },
            { id:36, jp:"すぐ", kanji:"", arti:"Segera, langsung" },
            { id:37, jp:"また", kanji:"", arti:"Lagi" },
            { id:38, jp:"あとで", kanji:"", arti:"Nanti" },
            { id:39, jp:"もうすこし", kanji:"もう少し", arti:"Sedikit lagi" },
            { id:40, jp:"もう～", kanji:"", arti:"~lagi" },
            { id:41, jp:"さあ", kanji:"", arti:"Mari" },
            { id:42, jp:"あれ？", kanji:"", arti:"Ah (saat heran atau kaget)" },
            { id:43, jp:"これでおねがいします", kanji:"これでお願いします", arti:"Minta dengan ini" },
            { id:44, jp:"おつり", kanji:"お釣り", arti:"Kembalian" },
            { id:45, jp:"きっぷうりば", kanji:"切符売り場", arti:"Loket penjualan karcis" },
            { id:46, jp:"じどうけんばいき", kanji:"自動券売機", arti:"Mesin karcis otomatis" },
            { id:47, jp:"せいさんき", kanji:"精算機", arti:"Alat penghitung otomatis" },
            { id:48, jp:"かいさつぐち", kanji:"改札口", arti:"Pintu pemeriksaan karcis" },
            { id:49, jp:"でぐち", kanji:"出口", arti:"Pintu keluar" },
            { id:50, jp:"いりぐち", kanji:"入口", arti:"Pintu masuk" },
            { id:51, jp:"ひがしぐち", kanji:"東口", arti:"Pintu timur" },
            { id:52, jp:"にしぐち", kanji:"西口", arti:"Pintu barat" },
            { id:53, jp:"みなみぐち", kanji:"南口", arti:"Pintu selatan" },
            { id:54, jp:"きたぐち", kanji:"北口", arti:"Pintu utara" },
            { id:55, jp:"ちゅうおうぐち", kanji:"中央口", arti:"Pintu tengah" },
            { id:56, jp:"プラットホーム", kanji:"", arti:"Peron" },
            { id:57, jp:"ばいてん", kanji:"売店", arti:"Kios, kedai" },
            { id:58, jp:"コインロッカー", kanji:"", arti:"Loker" },
            { id:59, jp:"タクシーのりば", kanji:"", arti:"Tempat naik taksi" },
            { id:60, jp:"バスターミナル", kanji:"", arti:"Terminal bis" },
            { id:61, jp:"バスてい", kanji:"バス停", arti:"Halte bis" },
            { id:62, jp:"かいそく", kanji:"快速", arti:"Kereta cepat yang lewat pinggir kota" },
            { id:63, jp:"じゅんそく", kanji:"準急", arti:"Kereta semi cepat" },
            { id:64, jp:"じこくひょう", kanji:"時刻表", arti:"Jadwal keberangkatan bis,kereta dll" },
            { id:65, jp:"～はつ", kanji:"～発", arti:"Berangkat dari / berangkat pukul" },
            { id:66, jp:"～ちゃく", kanji:"～着", arti:"Berangkat ke / tiba pukul" },
            { id:67, jp:"とうきょういき", kanji:"東京行き", arti:"Tujuan tokyo" },
            { id:68, jp:"ていきけん", kanji:"定期券", arti:"Kartu langganan berjangka" },
            { id:69, jp:"かいすうけん", kanji:"回数券", arti:"Karcis kupon" },
            { id:70, jp:"かたみち", kanji:"片道", arti:"Sekali jalan" },
            { id:71, jp:"おうふく", kanji:"往復", arti:"Pulang pergi" }
        ];

        // ==============================================
        // VARIABEL KUIS
        // ==============================================
        let daftarSoal = [];
        let nomorSekarang = 0;
        let skorBenar = 0;
        let sudahDijawab = false;

        // Elemen HTML
        const areaSoal = document.getElementById('area-soal');
        const skorEl = document.getElementById('skor');
        const totalSoalEl = document.getElementById('total-soal');
        const btnBerikut = document.getElementById('btn-berikut');
        const btnUlang = document.getElementById('btn-ulang');
        const hasilAkhirEl = document.getElementById('hasil-akhir');
        const nilaiAkhirEl = document.getElementById('nilai-akhir');
        const pesanHasilEl = document.getElementById('pesan-hasil');

        // ==============================================
        // FUNGSI UTAMA
        // ==============================================
        function mulaiKuis() {
            // Reset semua
            nomorSekarang = 0;
            skorBenar = 0;
            sudahDijawab = false;
            hasilAkhirEl.classList.add('hidden');
            areaSoal.innerHTML = '';
            
            // Acak urutan soal
            daftarSoal = [...kosakata].sort(() => Math.random() - 0.5);
            
            // Tampilkan total
            totalSoalEl.innerText = daftarSoal.length;
            skorEl.innerText = skorBenar;

            // Tampilkan soal pertama
            tampilkanSoal();
        }

        function tampilkanSoal() {
            sudahDijawab = false;
            const soal = daftarSoal[nomorSekarang];

            // Buat pilihan jawaban (A-E)
            let pilihanJawaban = [soal.arti]; // Jawaban benar
            // Ambil 4 jawaban acak lain
            while(pilihanJawaban.length < 5) {
                const acak = kosakata[Math.floor(Math.random() * kosakata.length)].arti;
                if(!pilihanJawaban.includes(acak)) pilihanJawaban.push(acak);
            }
            // Acak posisi pilihan
            pilihanJawaban = pilihanJawaban.sort(() => Math.random() - 0.5);

            // HTML Soal
            areaSoal.innerHTML = `
            <div class="soal-card bg-white/90 backdrop-blur-md rounded-2xl p-8 shadow-2xl">
                <div class="mb-6 text-center">
                    <span class="text-sm text-gray-500">Soal ${nomorSekarang+1} dari ${daftarSoal.length}</span>
                    <h2 class="text-[clamp(1.5rem,4vw,2.5rem)] font-jp font-bold text-jp-blue mt-2">
                        ${soal.jp}
                    </h2>
                    ${soal.kanji ? `<p class="text-xl text-jp-red font-semibold mt-1">${soal.kanji}</p>` : ''}
                </div>

                <div class="space-y-3 mt-8" id="daftar-pilihan">
                    ${pilihanJawaban.map((pil, idx) => `
                    <button class="pilihan w-full text-left p-4 rounded-lg border-2 border-gray-200 hover:border-jp-gold hover:bg-jp-cream/30 transition-all" 
                            data-jawaban="${pil}">
                        <span class="font-bold mr-3">${String.fromCharCode(65+idx)}.</span> ${pil}
                    </button>
                    `).join('')}
                </div>
            </div>
            `;

            // Tambah event klik pilihan
            document.querySelectorAll('.pilihan').forEach(btn => {
                btn.addEventListener('click', cekJawaban);
            });
        }

        function cekJawaban(e) {
            if(sudahDijawab) return;
            sudahDijawab = true;

            const dipilih = e.target.closest('.pilihan');
            const jawabanUser = dipilih.dataset.jawaban;
            const jawabanBenar = daftarSoal[nomorSekarang].arti;

            // Tandai benar/salah
            document.querySelectorAll('.pilihan').forEach(btn => {
                btn.classList.add('opacity-70');
                if(btn.dataset.jawaban === jawabanBenar) btn.classList.add('benar');
            });

            if(jawabanUser === jawabanBenar) {
                skorBenar++;
                skorEl.innerText = skorBenar;
                dipilih.classList.add('scale-[0.98]');
            } else {
                dipilih.classList.add('salah', 'scale-[0.98]');
            }
        }

        function soalBerikutnya() {
            nomorSekarang++;
            if(nomorSekarang < daftarSoal.length) {
                tampilkanSoal();
            } else {
                tampilkanHasil();
            }
        }

        function tampilkanHasil() {
            areaSoal.innerHTML = '';
            hasilAkhirEl.classList.remove('hidden');
            
            const nilai = Math.round((skorBenar / daftarSoal.length) * 100);
            nilaiAkhirEl.innerText = nilai + '%';

            // Pesan sesuai nilai
            if(nilai >= 90) pesanHasilEl.innerText = "Luar biasa! Hafalanmu sangat sempurna 👏";
            else if(nilai >= 75) pesanHasilEl.innerText = "Bagus sekali! Sudah sangat paham 🎉";
            else if(nilai >= 60) pesanHasilEl.innerText = "Cukup baik, tinggal sedikit lagi untuk sempurna 💪";
            else pesanHasilEl.innerText = "Masih perlu latihan lagi, semangat ya! 😊";
        }

        // Event tombol
        btnBerikut.addEventListener('click', soalBerikutnya);
        btnUlang.addEventListener('click', mulaiKuis);

        // Mulai kuis saat buka halaman
        window.onload = mulaiKuis;
    </script>
</body>
</html>
