<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Kosakata Jepang - Bab 21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jp: {
                            red: '#D62828',
                            gold: '#F77F00',
                            blue: '#003049',
                            light: '#FCBF49',
                            cream: '#EAE2B7',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        jp: ['"Noto Sans JP"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #003049, #D62828);
            min-height: 100vh;
        }
        .soal-card {
            transition: all 0.3s ease;
        }
        .pilihan {
            transition: all 0.2s ease;
        }
        .benar {
            background-color: #10B981 !important;
            color: white !important;
        }
        .salah {
            background-color: #EF4444 !important;
            color: white !important;
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-[clamp(1.8rem,5vw,3rem)] font-bold text-white mb-2 drop-shadow-lg">
                🇯🇵 Kuis Kosakata Jepang <br> <span class="text-jp-light">BAB 21</span>
            </h1>
            <p class="text-white/80">Uji ingatanmu! Pertanyaan muncul secara acak.</p>
            <div class="mt-4 text-white font-semibold">Skor: <span id="skor">0</span> / <span id="total-soal">0</span></div>
        </div>

        <!-- Area Soal -->
        <div id="area-soal" class="space-y-6">
            <!-- Soal akan muncul di sini lewat JavaScript -->
        </div>

        <!-- Tombol Navigasi -->
        <div class="flex justify-between mt-8">
            <button id="btn-ulang" class="bg-white/20 backdrop-blur-sm text-white px-6 py-3 rounded-lg font-semibold hover:bg-white/30 transition-all">
                🔄 Ulangi Kuis
            </button>
            <button id="btn-berikut" class="bg-jp-gold text-white px-6 py-3 rounded-lg font-semibold shadow-lg hover:scale-105 transition-all">
                Soal Berikutnya ➡️
            </button>
        </div>

        <!-- Hasil Akhir -->
        <div id="hasil-akhir" class="hidden mt-10 bg-white/90 backdrop-blur-md rounded-2xl p-8 text-center shadow-2xl">
            <h2 class="text-3xl font-bold text-jp-blue mb-4">🎉 Selesai!</h2>
            <p class="text-xl mb-2">Skor Kamu:</p>
            <p class="text-5xl font-bold text-jp-red mb-4" id="nilai-akhir">0</p>
            <p id="pesan-hasil" class="text-lg text-gray-700"></p>
            <button onclick="mulaiKuis()" class="mt-6 bg-jp-gold text-white px-8 py-3 rounded-lg font-semibold hover:scale-105 transition-all">
                Main Lagi
            </button>
        </div>
    </div>


    <script>
        // ==============================================
        // DAFTAR KOSAKATA BAB 21 (SUDAH DIKOREKSI HIRAGANA, KANJI & EJAAN)
        // ==============================================
        const kosakata = [
            { id:1, jp:"おもいます", kanji:"思います", arti:"Mengira, berpikir" },
            { id:2, jp:"いいます", kanji:"言います", arti:"Berkata, mengatakan" },
            { id:3, jp:"かちます", kanji:"勝ちます", arti:"Menang" },
            { id:4, jp:"まけます", kanji:"負けます", arti:"Kalah" },
            { id:5, jp:"やくにたちます", kanji:"役に立ちます", arti:"Bermanfaat, berguna" },
            { id:6, jp:"うごきます", kanji:"動きます", arti:"Pindah, bergerak" },
            { id:7, jp:"やめます (を)", kanji:"止めます", arti:"Berhenti" },
            { id:8, jp:"きをつけます", kanji:"気を付けます", arti:"Berhati-hati, berwaspada" },
            { id:9, jp:"りゅうがくします", kanji:"留学します", arti:"Studi di luar negeri" },
            { id:10, jp:"むだな", kanji:"無駄な", arti:"Sia-sia, tidak berguna" },
            { id:11, jp:"ふべんな", kanji:"不便な", arti:"Tidak praktis, tidak nyaman" },
            { id:12, jp:"すごい", kanji:"", arti:"Hebat, luar biasa" },
            { id:13, jp:"ほんとう", kanji:"本当", arti:"Betul, benar" },
            { id:14, jp:"うそ", kanji:"嘘", arti:"Bohong, tidak benar" },
            { id:15, jp:"じどうしゃ", kanji:"自動車", arti:"Mobil, kendaraan bermotor" },
            { id:16, jp:"こうつう", kanji:"交通", arti:"Lalu lintas, transportasi" },
            { id:17, jp:"ぶっか", kanji:"物価", arti:"Harga barang, tingkat harga umum" },
            { id:18, jp:"ニュース", kanji:"", arti:"Siaran, berita, pengumuman" },
            { id:19, jp:"アニメ", kanji:"", arti:"Animasi, film kartun" },
            { id:20, jp:"マンガ", kanji:"漫画", arti:"Komik, cerita bergambar" },
            { id:21, jp:"デザイン", kanji:"", arti:"Desain, rancangan, model" },
            { id:22, jp:"ゆめ", kanji:"夢", arti:"Mimpi, cita-cita" },
            { id:23, jp:"てんさい", kanji:"天才", arti:"Jenius, berbakat hebat" },
            { id:24, jp:"しあい", kanji:"試合", arti:"Pertandingan, perlombaan" },
            { id:25, jp:"いけん", kanji:"意見", arti:"Pendapat, pandangan, opini" },
            { id:26, jp:"はなし", kanji:"話", arti:"Cerita, pembicaraan, kisah" },
            { id:27, jp:"ちきゅう", kanji:"地球", arti:"Bumi, dunia" },
            { id:28, jp:"つき", kanji:"月", arti:"Bulan" },
            { id:29, jp:"さいきん", kanji:"最近", arti:"Akhir-akhir ini, baru-baru ini" },
            { id:30, jp:"たぶん", kanji:"", arti:"Mungkin, barangkali" },
            { id:31, jp:"きっと", kanji:"", arti:"Pasti, sudah tentu" },
            { id:32, jp:"ほんとうに", kanji:"本当に", arti:"Betul-betul, sungguh, benar-benar" },
            { id:33, jp:"そんなに", kanji:"", arti:"Tidak begitu (diikuti kata negatif)" },
            { id:34, jp:"～について", kanji:"～に就いて", arti:"Tentang ~, mengenai ~" },
            { id:35, jp:"ひさしぶりですね", kanji:"久しぶりですね", arti:"Sudah lama tidak bertemu ya" },
            { id:36, jp:"もちろん", kanji:"", arti:"Tentu saja, pastilah" },
            { id:37, jp:"やくしょめい", kanji:"役職名", arti:"Nama-nama jabatan, nama pangkat" },
            { id:38, jp:"とどうふけん", kanji:"都道府県", arti:"Prefektur, pembagian wilayah Jepang" },
            { id:39, jp:"し", kanji:"市", arti:"Kota" },
            { id:40, jp:"まち", kanji:"町", arti:"Distrik, daerah, kota kecil" },
            { id:41, jp:"むら", kanji:"村", arti:"Desa, kampung" },
            { id:42, jp:"しゅしょう (ないかくりそうだいじん)", kanji:"首相 (内閣総理大臣)", arti:"Perdana Menteri" },
            { id:43, jp:"ちじ", kanji:"知事", arti:"Gubernur, kepala prefektur" },
            { id:44, jp:"しちょう", kanji:"市長", arti:"Wali kota" },
            { id:45, jp:"ちょうちょう", kanji:"町長", arti:"Kepala daerah / kepala kota kecil" },
            { id:46, jp:"そんちょう", kanji:"村長", arti:"Kepala desa" },
            { id:47, jp:"がくちょう", kanji:"学長", arti:"Rektor" },
            { id:48, jp:"こうちょう", kanji:"校長", arti:"Kepala sekolah" },
            { id:49, jp:"えんちょう", kanji:"園長", arti:"Kepala TK / kepala taman kanak-kanak" },
            { id:50, jp:"かいちょう", kanji:"会長", arti:"Ketua, pimpinan organisasi" },
            { id:51, jp:"じゅうやく", kanji:"重役", arti:"Direktur, pejabat tinggi perusahaan" },
            { id:52, jp:"ぶちょう", kanji:"部長", arti:"Kepala bagian" },
            { id:53, jp:"かちょう", kanji:"課長", arti:"Kepala seksi" },
            { id:54, jp:"とうどり", kanji:"頭取", arti:"Direktur bank" },
            { id:55, jp:"してんちょう", kanji:"支店長", arti:"Kepala kantor cabang" },
            { id:56, jp:"えきちょう", kanji:"駅長", arti:"Kepala stasiun" },
            { id:57, jp:"いんちょう", kanji:"院長", arti:"Direktur rumah sakit" },
            { id:58, jp:"かんごしちょう", kanji:"看護師長", arti:"Kepala perawat" },
            { id:59, jp:"けいさつ", kanji:"警察", arti:"Kantor polisi, kepolisian" },
            { id:60, jp:"しょちょう", kanji:"署長", arti:"Kepala kantor polisi" }
        ];

        // ==============================================
        // VARIABEL KUIS
        // ==============================================
        let daftarSoal = [];
        let nomorSekarang = 0;
        let skorBenar = 0;
        let sudahDijawab = false;

        // Elemen HTML
        const areaSoal = document.getElementById('area-soal');
        const skorEl = document.getElementById('skor');
        const totalSoalEl = document.getElementById('total-soal');
        const btnBerikut = document.getElementById('btn-berikut');
        const btnUlang = document.getElementById('btn-ulang');
        const hasilAkhirEl = document.getElementById('hasil-akhir');
        const nilaiAkhirEl = document.getElementById('nilai-akhir');
        const pesanHasilEl = document.getElementById('pesan-hasil');

        // ==============================================
        // FUNGSI UTAMA
        // ==============================================
        function mulaiKuis() {
            // Reset semua
            nomorSekarang = 0;
            skorBenar = 0;
            sudahDijawab = false;
            hasilAkhirEl.classList.add('hidden');
            areaSoal.innerHTML = '';
            
            // Acak urutan soal
            daftarSoal = [...kosakata].sort(() => Math.random() - 0.5);
            
            // Tampilkan total
            totalSoalEl.innerText = daftarSoal.length;
            skorEl.innerText = skorBenar;

            // Tampilkan soal pertama
            tampilkanSoal();
        }

        function tampilkanSoal() {
            sudahDijawab = false;
            const soal = daftarSoal[nomorSekarang];

            // Buat pilihan jawaban (A-E)
            let pilihanJawaban = [soal.arti]; // Jawaban benar
            // Ambil 4 jawaban acak lain
            while(pilihanJawaban.length < 5) {
                const acak = kosakata[Math.floor(Math.random() * kosakata.length)].arti;
                if(!pilihanJawaban.includes(acak)) pilihanJawaban.push(acak);
            }
            // Acak posisi pilihan
            pilihanJawaban = pilihanJawaban.sort(() => Math.random() - 0.5);

            // HTML Soal
            areaSoal.innerHTML = `
            <div class="soal-card bg-white/90 backdrop-blur-md rounded-2xl p-8 shadow-2xl">
                <div class="mb-6 text-center">
                    <span class="text-sm text-gray-500">Soal ${nomorSekarang+1} dari ${daftarSoal.length}</span>
                    <h2 class="text-[clamp(1.5rem,4vw,2.5rem)] font-jp font-bold text-jp-blue mt-2">
                        ${soal.jp}
                    </h2>
                    ${soal.kanji ? `<p class="text-xl text-jp-red font-semibold mt-1">${soal.kanji}</p>` : ''}
                </div>

                <div class="space-y-3 mt-8" id="daftar-pilihan">
                    ${pilihanJawaban.map((pil, idx) => `
                    <button class="pilihan w-full text-left p-4 rounded-lg border-2 border-gray-200 hover:border-jp-gold hover:bg-jp-cream/30 transition-all" 
                            data-jawaban="${pil}">
                        <span class="font-bold mr-3">${String.fromCharCode(65+idx)}.</span> ${pil}
                    </button>
                    `).join('')}
                </div>
            </div>
            `;

            // Tambah event klik pilihan
            document.querySelectorAll('.pilihan').forEach(btn => {
                btn.addEventListener('click', cekJawaban);
            });
        }

        function cekJawaban(e) {
            if(sudahDijawab) return;
            sudahDijawab = true;

            const dipilih = e.target.closest('.pilihan');
            const jawabanUser = dipilih.dataset.jawaban;
            const jawabanBenar = daftarSoal[nomorSekarang].arti;

            // Tandai benar/salah
            document.querySelectorAll('.pilihan').forEach(btn => {
                btn.classList.add('opacity-70');
                if(btn.dataset.jawaban === jawabanBenar) btn.classList.add('benar');
            });

            if(jawabanUser === jawabanBenar) {
                skorBenar++;
                skorEl.innerText = skorBenar;
                dipilih.classList.add('scale-[0.98]');
            } else {
                dipilih.classList.add('salah', 'scale-[0.98]');
            }
        }

        function soalBerikutnya() {
            nomorSekarang++;
            if(nomorSekarang < daftarSoal.length) {
                tampilkanSoal();
            } else {
                tampilkanHasil();
            }
        }

        function tampilkanHasil() {
            areaSoal.innerHTML = '';
            hasilAkhirEl.classList.remove('hidden');
            
            const nilai = Math.round((skorBenar / daftarSoal.length) * 100);
            nilaiAkhirEl.innerText = nilai + '%';

            // Pesan sesuai nilai
            if(nilai >= 90) pesanHasilEl.innerText = "Luar biasa! Hafalanmu sangat sempurna 👏";
            else if(nilai >= 75) pesanHasilEl.innerText = "Bagus sekali! Sudah sangat paham 🎉";
            else if(nilai >= 60) pesanHasilEl.innerText = "Cukup baik, tinggal sedikit lagi untuk sempurna 💪";
            else pesanHasilEl.innerText = "Masih perlu latihan lagi, semangat ya! 😊";
        }

        // Event tombol
        btnBerikut.addEventListener('click', soalBerikutnya);
        btnUlang.addEventListener('click', mulaiKuis);

        // Mulai kuis saat buka halaman
        window.onload = mulaiKuis;
    </script>
</body>
</html>
